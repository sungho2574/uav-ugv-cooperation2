# Known survey-area map, loaded directly (plain YAML, not a ROS2 parameter file).
# control_node is given the path to this file via the `mission_map_path` parameter
# and parses it itself with PyYAML. boundary is CCW; dead_zones are holes excluded
# from coverage.
frame_id: "map"
grid_resolution: 0.10
uav_cruise_altitude: 1.0
coverage_line_spacing: 0.5
marker_size: 0.14

# COVERING-phase streaming reference speed, m/s. Lower this if cells are
# being missed (visited_indices gaps in /mission/progress): the drone
# tracks a faster-moving cmd_full_state reference more loosely, so it may
# never come within control_node's `arrival_radius` parameter of every cell
# center. See control_node.py's _step_covering/_update_visited_cells.
cruise_speed: 0.1

# SCoPP coverage path-planning profile (see path_planning.py):
#   paper_nn   - greedy nearest-neighbour (KD-tree). Fast, default.
#   metric_tsp - grid shortest-path TSP (Held-Karp <=20 targets, else
#                cheapest-insertion + 2-opt). Shorter routes, but planning
#                takes a few seconds per drone on large zones.
coverage_profile: "paper_nn"

boundary: [[0.0, 0.0], [10.0, 0.0], [10.0, 6.0], [0.0, 6.0]]

# Dead zones are holes excluded from coverage. Unlike the old ㄹ-shape sweep,
# the SCoPP path planner stitches cells with a 4-neighbour A* (path_planning.py),
# so a dead zone in the *middle* of a zone is routed around cleanly rather than
# jumped straight across -- obstacles no longer need to be tucked into a corner.
# (A dead zone that splits a drone's region into two disconnected pieces still
# degrades to a straight jump between the pieces -- see plan_node_path.)
dead_zones:
  - name: "obstacle_1"
    points: [[8.0, 5.0], [10.0, 5.0], [10.0, 6.0], [8.0, 6.0]]

# Drone identity/count is NOT configured here -- crazyswarm2 already requires
# crazyflies.yaml (mission_bringup/config/crazyflies.yaml) to exist and list
# every robot with its radio uri/type, so that file is the single source of
# truth for which drones fly: sim.launch.py/real.launch.py read its `enabled`
# robots and use that as the drone_ids list everywhere (control_node,
# cf_perception, gcs_dashboard). To fly with fewer than 3 drones, toggle
# `enabled` per-robot in crazyflies.yaml -- nothing to change here.
# Each drone's actual spawn point/home is computed at launch time by the SCoPP
# planner as the start cell of whichever zone it's allocated (drone i is seeded
# into the i-th slice of the arena, then Lloyd clustering + auction refine the
# zones); home_yaw is always 0 (hardcoded in control_node.py). See
# mission_planner.py / grid.seed_positions.

ugv:
  start_position: [0.5, 0.0, 0.0]
  start_yaw: 0.0
