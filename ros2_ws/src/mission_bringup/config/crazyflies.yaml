# crazyswarm2-native robot config, passed to crazyflie/launch/launch.py via
# crazyflies_yaml_file:=<this file>. initial_position matches each drone's
# home_position in mission_map.yaml so sim/real start where control_node expects.
fileversion: 3

robots:
  # uri is the drone's actual radio address burned into its firmware --
  # unrelated to the "cf6/cf7/cf8" label, which is just our own naming.
  # cf8's E7E7E7E7E8 was confirmed against cfclient's successful connection;
  # cf6/cf7 below just follow the same last-nibble pattern as a guess and are
  # UNVERIFIED -- check each one in cfclient before relying on it.
  cf6:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E6
    initial_position: [0.5, 0.5, 0.0]
    type: cf21
  cf7:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E7
    initial_position: [0.5, 3.0, 0.0]
    type: cf21
  cf8:
    enabled: true
    uri: radio://0/80/2M/E7E7E7E7E8
    initial_position: [0.5, 5.5, 0.0]
    type: cf21

robot_types:
  cf21:
    motion_capture:
      tracking: "librigidbodytracker"
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8
      voltage_critical: 3.7

all:
  firmware_logging:
    enabled: true
    default_topics:
      pose:
        frequency: 10
      status:
        frequency: 1
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2
      controller: 2
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
  reference_frame: "world"
  broadcasts:
    num_repeats: 15
    delay_between_repeats_ms: 1
