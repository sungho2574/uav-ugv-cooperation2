<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>UAV-UGV Mission GCS</title>
<style>
  html, body { margin: 0; height: 100%; background: #14161a; color: #e6e6e6;
               font-family: -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  #layout { display: flex; height: 100vh; width: 100vw; }
  #scene-pane { position: relative; flex: 1 1 auto; min-width: 0; }
  #scene-pane canvas { display: block; }
  #hud { position: absolute; top: 10px; left: 10px; background: rgba(20,22,26,0.75);
         padding: 8px 12px; border-radius: 6px; font-size: 14px; z-index: 2; }
  #hud .phase { font-weight: 600; color: #7fd8ff; }
  #start-btn { margin-left: 10px; padding: 4px 12px; border-radius: 4px; border: none;
               background: #2e7d32; color: white; cursor: pointer; font-size: 13px; }
  #start-btn:hover:not(:disabled) { background: #388e3c; }
  #start-btn:disabled { background: #3a3d42; color: #8a8f96; cursor: default; }
  #legend { position: absolute; bottom: 10px; left: 10px; background: rgba(20,22,26,0.75);
            padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 2; }
  #legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
                     margin-right: 6px; }
  #marker-status { position: absolute; bottom: 10px; right: 10px; background: rgba(20,22,26,0.75);
                    padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 2;
                    text-align: right; max-width: 260px; }
  #marker-status .marker-count { font-weight: 600; color: #f5c542; margin-bottom: 4px; }
  #marker-status .marker-ids { color: #cfd3d8; word-break: break-word; }
  #video-pane { flex: 0 0 320px; display: flex; flex-direction: column;
                border-left: 1px solid #2a2d33; background: #1a1c20;
                transition: flex-basis 0.15s ease, width 0.15s ease; overflow: hidden; }
  #video-pane.collapsed { flex: 0 0 0; width: 0; border-left: none; }
  .video-tile { flex: 1 1 0; display: flex; flex-direction: column; border-bottom: 1px solid #2a2d33;
                min-width: 320px; }
  .video-tile h3 { margin: 6px 8px; font-size: 13px; color: #9aa0a6; font-weight: 500;
                   display: flex; align-items: center; gap: 8px; }
  .link-badges { display: flex; gap: 8px; font-weight: 400; font-size: 11px; }
  .link-badge { color: #6a6f76; } /* unknown/no data yet (e.g. sim) */
  .link-badge.up { color: #6fd888; }
  .link-badge.down { color: #ff6b6b; }
  .video-tile .frame-wrap { flex: 1; display: flex; align-items: center; justify-content: center;
                            background: #000; margin: 0 8px 8px 8px; border-radius: 4px; overflow: hidden; }
  .video-tile img { max-width: 100%; max-height: 100%; }
  .video-tile .no-signal { color: #555; font-size: 12px; }
  #video-toggle { position: fixed; top: 10px; right: 10px; z-index: 20; width: 30px; height: 30px;
                   border-radius: 4px; border: none; background: rgba(20,22,26,0.85);
                   color: #e6e6e6; cursor: pointer; font-size: 14px; }
  #video-toggle:hover { background: rgba(45,50,58,0.9); }
</style>
</head>
<body>
<div id="layout">
  <div id="scene-pane">
    <div id="hud">
      <span class="phase" id="phase-text">-</span>
      <button id="start-btn">Start Mission</button>
    </div>
    <div id="legend"></div>
    <div id="marker-status"></div>
  </div>
  <div id="video-pane">
    {% for drone_id in drone_ids %}
    <div class="video-tile">
      <h3>{{ drone_id }}
        <span class="link-badges">
          <span class="link-badge" id="wifi-badge-{{ drone_id }}">&#9679; WiFi</span>
          <span class="link-badge" id="radio-badge-{{ drone_id }}">&#9679; Radio</span>
        </span>
      </h3>
      <div class="frame-wrap"><img id="frame-{{ drone_id }}" alt=""><span class="no-signal" id="no-signal-{{ drone_id }}">no video</span></div>
    </div>
    {% endfor %}
  </div>
</div>
<button id="video-toggle" title="영상 패널 접기/펼치기">▶</button>

<script src="{{ url_for('static', filename='three.min.js') }}"></script>
<script src="{{ url_for('static', filename='OrbitControls.js') }}"></script>
<script>window.DRONE_IDS = {{ drone_ids | tojson }};</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
