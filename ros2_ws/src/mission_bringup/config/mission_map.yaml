# Known survey-area map, loaded directly (plain YAML, not a ROS2 parameter file).
# control_node is given the path to this file via the `mission_map_path` parameter
# and parses it itself with PyYAML. boundary is CCW; dead_zones are holes excluded
# from coverage.
frame_id: "map"
grid_resolution: 0.10
uav_cruise_altitude: 0.5 # meters -- 50cm
coverage_line_spacing: 0.5
marker_size: 0.14

# Real-hardware object detection backend for real_perception_node (sim always
# uses ground-truth from true_markers.yaml regardless of this setting -- see
# sim_perception_node.py). See docs/map_configuration.md sec. 7 for full
# tuning guidance for both backends.
#   aruco - fiducial markers (DICT_6X6_250), persistent ID + solvePnP depth.
#   yolo  - YOLOv8-ONNX object detector; no depth/ID from a single frame, so
#           position comes from casting a ray through the camera to the
#           ground plane (yolo.target_height) and identity is approximated by
#           bucketing detections' world position (yolo.cluster_radius).
# detection_backend: "aruco"
detection_backend: "yolo"

# Where real_perception_node actually runs.
#   native (default) - launched as a plain ROS2 node on this machine, same
#     as every other node here. Use this on a laptop/dev machine where
#     `pip install ultralytics` (which pulls torch) just works.
#   docker - launched inside the cf_perception:jetson container (see
#     cf_perception/docker/) instead, talking to the rest of the mission
#     over ROS2 DDS via network_mode: host. Use this on the Jetson, where a
#     JetPack-matched torch/ultralytics build is fragile to install natively
#     but the ultralytics/ultralytics jetson-jetpack6 base image already has
#     it working. Build the image once ahead of time with
#     `cd ros2_ws/src/cf_perception/docker && docker compose build`
#     before launching with this set to "docker" -- real.launch.py does NOT
#     build it automatically (way too slow to happen inline on every launch).
perception_runtime: "native"
# Only read when perception_runtime is "docker" -- the image tag built above.
docker_image: "cf_perception:jetson"

yolo:
  # Empty -> real.launch.py defaults to cf_perception's installed
  # share/weights/human_yolo11n_gray.onnx (see DEFAULT_YOLO_WEIGHTS_FILENAME
  # there). Set an absolute path here to use a different model instead.
  weights_path: ""
  # Class names always come from the .onnx's own export metadata (no override
  # field here) -- see docs/map_configuration.md sec. 8.4.
  confidence_threshold: 0.5
  nms_threshold: 0.45
  # Input size is NOT configured here either -- it's read from the .onnx's own
  # export metadata (see docs/map_configuration.md sec. 8.4). A model exported
  # with a static input shape (e.g. 416x416) will fail with an onnxruntime
  # shape-mismatch error if forced to a different size.
  target_height: 0.0 # object height off the floor, m (e.g. a lying-down survivor model)
  cluster_radius: 0.5 # dedup radius, m -- same-class detections closer than this merge into one record

# COVERING-phase streaming reference speed, m/s. Lower this if cells are
# being missed (visited_indices gaps in /mission/progress): the drone
# tracks a faster-moving cmd_full_state reference more loosely, so it may
# never come within control_node's `arrival_radius` parameter of every cell
# center. See control_node.py's _step_covering/_update_visited_cells.
cruise_speed: 0.2

boundary: [[0.0, 0.0], [4.0, 0.0], [4.0, 4.3], [0.0, 4.3]]

# Kept in a corner on purpose: coverage_plan.py's ㄹ-shape sweep has no
# hole-avoidance logic at all -- it just skips a cell if it's not in the
# assigned cell list. A dead zone in the middle of a zone would cut a gap out
# of the *middle* of some row, which the naive sweep would jump straight
# across; tucked into a corner it only ever trims the end of a row instead.
dead_zones:
  - name: "obstacle_1"
    points: []

# Drone identity/count is NOT configured here -- crazyswarm2 already requires
# crazyflies.yaml (mission_bringup/config/crazyflies.yaml) to exist and list
# every robot with its radio uri/type, so that file is the single source of
# truth for which drones fly: sim.launch.py/real.launch.py read its `enabled`
# robots and use that as the drone_ids list everywhere (control_node,
# cf_perception, gcs_dashboard). To fly with fewer than 3 drones, toggle
# `enabled` per-robot in crazyflies.yaml -- nothing to change here.
# Each drone's actual spawn point/home is computed at launch time as the
# first cell of whichever zone it's assigned (Nth enabled drone in
# crazyflies.yaml -> Nth region, left to right); home_yaw is always 0
# (hardcoded in control_node.py, not configurable). See coverage_plan.py.

ugv:
  start_position: [0.5, 0.0, 0.0]
  start_yaw: 0.0
